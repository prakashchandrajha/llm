# ═══════════════════════════════════════════════════════════════════════════════
# Phase 0 — Day Zero Stack (Inference + Training profiles, cgroup v2 enforced)
# ─────────────────────────────────────────────────────────────────────────────
# RULES enforced by this file:
#   1. Every container has mem_limit == memswap_limit  →  swap is impossible,
#      memory overruns become OOM kills visible in Langfuse/dmesg, never
#      invisible swap thrashing.
#   2. Two profiles:
#        - inference : Memgraph + Qdrant + Mem0 + LiteLLM
#        - training  : same minus KTransformers (deferred)
#   3. All host bindings are 127.0.0.1.
#
# EXTERNAL SERVICES (not managed by this compose):
#   - Langfuse stack  → langfuse project, http://localhost:3000  (healthy ✓)
#   - Ollama          → systemd service,  http://localhost:11434 (healthy ✓)
#                       Models present: qwen3:4b, nomic-embed-text, qwen3:8b,
#                       qwen3.6:35b-a3b-q4_K_M, qwen2.5-coder:7b
#                       Still needed: qwen3:0.5b, qwen3:3b, qwen3:7b
#
# Hardware: i7-14650HX (NO AMX), RTX 5050 8 GB (sm_120, Blackwell), 24 GB RAM,
#           NVMe 5050 MB/s seq read, cgroup v2 unified hierarchy.
# ═══════════════════════════════════════════════════════════════════════════════

x-restart-policy: &restart unless-stopped

# All containers that need to reach host services (Ollama, Langfuse) use this.
x-host-extra: &host_extra
  extra_hosts:
    - "host-gateway:host-gateway"

services:

  # ╔══════════════════════════════════════════════════════════════════════╗
  # ║ MEMGRAPH — Cypher KG. Bolt 7687. Hard limit 2.5 GB.                 ║
  # ║ Healthcheck: mgconsole (always present in image).                    ║
  # ╚══════════════════════════════════════════════════════════════════════╝
  memgraph:
    image: memgraph/memgraph:latest
    restart: *restart
    profiles: ["inference", "training"]
    command:
      - "--also-log-to-stderr=true"
      - "--telemetry-enabled=false"
      - "--bolt-server-name-for-init=Neo4j/5.0.0"
    ports:
      - "127.0.0.1:7687:7687"
      - "127.0.0.1:7444:7444"
    volumes:
      - memgraph_data:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host 127.0.0.1 --port 7687 --output-format=csv --no-history 2>/dev/null | grep -q '1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 15s
    mem_limit: 2560m
    memswap_limit: 2560m

  # ╔══════════════════════════════════════════════════════════════════════╗
  # ║ QDRANT — Mem0 vector store. Hard limit 1.2 GB.                       ║
  # ║ Healthcheck disabled: image has no curl/wget/bash/nc.                ║
  # ║ Verified healthy from host: curl http://localhost:6333/healthz ✓     ║
  # ╚══════════════════════════════════════════════════════════════════════╝
  qdrant:
    image: qdrant/qdrant:v1.14.0
    restart: *restart
    profiles: ["inference", "training"]
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      disable: true
    mem_limit: 1200m
    memswap_limit: 1200m

  # ╔══════════════════════════════════════════════════════════════════════╗
  # ║ MEM0 REST API — python:3.11-slim + pip install mem0ai.               ║
  # ║ Port 8765 (host) → 8000 (container).                                 ║
  # ║ pip cache volume prevents re-downloading on every restart.           ║
  # ║ Memory.from_config() deferred to FastAPI startup event so /health    ║
  # ║ responds immediately and crash loops are visible in logs.            ║
  # ╚══════════════════════════════════════════════════════════════════════╝
  mem0-server:
    image: python:3.11-slim
    restart: *restart
    profiles: ["inference", "training"]
    <<: *host_extra
    depends_on:
      qdrant: {condition: service_started}
    ports:
      - "127.0.0.1:8765:8000"
    environment:
      MEM0_LLM_MODEL: ${MEM0_LLM_MODEL:-qwen3:4b/no_think}
      MEM0_OLLAMA_BASE_URL: http://host-gateway:11434
      # OLLAMA_HOST is what the ollama Python client actually reads.
      # mem0ai's OllamaEmbedder ignores ollama_base_url in config and uses
      # the ollama client directly, which reads this env var.
      OLLAMA_HOST: http://host-gateway:11434
      MEM0_EMBEDDER_MODEL: ${MEM0_EMBED_MODEL:-nomic-embed-text}
      MEM0_QDRANT_URL: http://qdrant:6333
      MEM0_QDRANT_COLLECTION: ${MEM0_COLLECTION:-code-memory}
      PIP_CACHE_DIR: /pip-cache
    volumes:
      - ./mem0-server.py:/app/server.py:ro
      - mem0_pip_cache:/pip-cache
    command: >
      sh -c "pip install --quiet mem0ai qdrant-client ollama fastapi uvicorn &&
             python /app/server.py"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    mem_limit: 1024m
    memswap_limit: 1024m

  # ╔══════════════════════════════════════════════════════════════════════╗
  # ║ LITELLM PROXY — unified OpenAI-compatible gateway. Port 4000.        ║
  # ║ Traces every call to Langfuse. Ollama via host-gateway:11434.        ║
  # ║ FIX: entrypoint already calls "litellm" — only pass flags here.      ║
  # ║ FIX: healthcheck uses wget (curl not present in this image).         ║
  # ╚══════════════════════════════════════════════════════════════════════╝
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-stable
    restart: *restart
    profiles: ["inference", "training"]
    <<: *host_extra
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      LITELLM_LOG: INFO
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-2026}
      LANGFUSE_HOST: http://host-gateway:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-langfuse-dev}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-langfuse-dev}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      AION_API_KEY: ${AION_API_KEY}
      COHERE_API_KEY: ${COHERE_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
    volumes:
      - ./litellm-config.yml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 2048m
    memswap_limit: 2048m

  # ╔══════════════════════════════════════════════════════════════════════╗
  # ║ KTRANSFORMERS — opt-in profile only. Build DEFERRED (sm_120).        ║
  # ║ KV cache set to 2.5 GB — corrected for 7707 MB usable VRAM.         ║
  # ╚══════════════════════════════════════════════════════════════════════╝
  ktransformers:
    image: ktransformers-local:cuda13.2-sm120
    restart: *restart
    profiles: ["ktransformers"]
    <<: *host_extra
    ports:
      - "127.0.0.1:10002:10002"
    volumes:
      - ktransformers_experts:/models/experts
    environment:
      KT_BACKEND: cuda
      KT_CUDA_ARCH: "12.0"
      KT_AMX: "0"
      KT_KV_CACHE_GB: "2.5"
      LANGFUSE_HOST: http://host-gateway:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-langfuse-dev}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-langfuse-dev}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    mem_limit: 6g
    memswap_limit: 6g


  # NOTE: All 4 MCP servers run natively via stdio (no Docker needed):
  #   context7:        npx -y @upstash/context7-mcp
  #   serena:          uvx serena start --project <path>
  #   codebase-memory: npx -y codebase-memory-mcp
  #   coderunner:      npx -y coderunner-mcp

  # ╔══════════════════════════════════════════════════════════════════════╗
  # ║ REDIS — LiteLLM semantic cache + Graphiti. Port 6379.               ║
  # ╚══════════════════════════════════════════════════════════════════════╝
  redis:
    image: redis:7-alpine
    restart: *restart
    profiles: ["inference", "training"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 307m
    memswap_limit: 307m

  # ╔══════════════════════════════════════════════════════════════════════╗
  # ║ GRAPHITI — Temporal knowledge graph. Port 8000.                     ║
  # ║ Requires Memgraph (Bolt 7687) + LiteLLM on host.                   ║
  # ╚══════════════════════════════════════════════════════════════════════╝
  graphiti:
    image: zepai/graphiti:latest
    restart: *restart
    profiles: ["inference", "training"]
    <<: *host_extra
    depends_on:
      memgraph: {condition: service_healthy}
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      NEO4J_URI: bolt://memgraph:7687
      NEO4J_USER: ""
      NEO4J_PASSWORD: ""
      NEO4J_DATABASE: memgraph
      DEFAULT_DATABASE: memgraph
      OPENAI_API_KEY: "local-bypass"
      OPENAI_BASE_URL: http://host-gateway:4000/v1
      LLM_MODEL: qwen3:4b
      EMBEDDER_MODEL: nomic-embed-text
      EMBEDDER_BASE_URL: http://host-gateway:4000/v1
    volumes:
      - ./zep_graphiti_patch.py:/app/graph_service/zep_graphiti.py:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    mem_limit: 512m
    memswap_limit: 512m

  # ╔══════════════════════════════════════════════════════════════════════╗
  # ║ ACTIVEPIECES — Workflow automation (MIT). Port 8080.                ║
  # ╚══════════════════════════════════════════════════════════════════════╝
  activepieces:
    image: activepieces/activepieces:latest
    restart: *restart
    profiles: ["inference"]
    ports:
      - "127.0.0.1:8080:80"
    environment:
      AP_ENGINE_EXECUTABLE_PATH: dist/packages/engine/main.js
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:-change-me-32-char-key-here-1234}
      AP_JWT_SECRET: ${AP_JWT_SECRET:-change-me-jwt-secret-here-1234567}
      AP_FRONTEND_URL: http://localhost:8080
      AP_TELEMETRY_ENABLED: "false"
      AP_TEMPLATES_SOURCE_URL: ""
    volumes:
      - activepieces_data:/root/.activepieces
    mem_limit: 409m
    memswap_limit: 409m

  # NOTE: Jan runs as a native desktop app, not Docker.
  # Install: https://jan.ai  — runs on port 1337 natively.
  # Configure Ollama base URL to http://localhost:11434 in Jan settings.


volumes:
  memgraph_data:
  memgraph_log:
  qdrant_data:
  ktransformers_experts:
  mem0_pip_cache:
  redis_data:
  activepieces_data:
  jan_data:
