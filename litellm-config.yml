# ═══════════════════════════════════════════════════════════════════════════════
# LiteLLM Proxy Config — Phase 0
# Ollama runs as host systemd service → http://host-gateway:11434
# Langfuse runs in separate docker project → http://host-gateway:3000
# Hardware: i7-14650HX (no AMX), RTX 5050 sm_120, CUDA 13.2
# Model mapping (Ollama registry has no 0.5b/3b/7b):
#   coordinator → qwen3:0.6b  (was 0.5b)
#   synthesis   → qwen3:1.7b  (was 3b)
#   master      → qwen3:8b    (was 7b, already present)
# ═══════════════════════════════════════════════════════════════════════════════

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  drop_params: true
  request_timeout: 300

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  retry_after: 5
  fallbacks:
    - {"qwen3:35b-fallback": ["master"]}

model_list:
  # ── Coordinator (Qwen3-0.6B) ─────────────────────────────────────────────
  - model_name: coordinator
    litellm_params:
      model: ollama/qwen3:0.6b
      api_base: http://host-gateway:11434

  - model_name: qwen3:0.6b
    litellm_params:
      model: ollama/qwen3:0.6b
      api_base: http://host-gateway:11434

  # ── Mem0 LLM + DoCoreAI (Qwen3-4B) ──────────────────────────────────────
  - model_name: qwen3:4b
    litellm_params:
      model: ollama/qwen3:4b
      api_base: http://host-gateway:11434

  # ── Synthesis tier (Qwen3-1.7B) ──────────────────────────────────────────
  - model_name: synthesis
    litellm_params:
      model: ollama/qwen3:1.7b
      api_base: http://host-gateway:11434

  - model_name: qwen3:1.7b
    litellm_params:
      model: ollama/qwen3:1.7b
      api_base: http://host-gateway:11434

  # ── Master base (Qwen3-8B, already present) ───────────────────────────────
  - model_name: master
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://host-gateway:11434

  - model_name: qwen3:8b
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://host-gateway:11434

  # ── Embedding tier ────────────────────────────────────────────────────────
  - model_name: embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host-gateway:11434

  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host-gateway:11434

  # ── 35B fallback (qwen3.6:35b-a3b-q4_K_M, already present) ──────────────
  - model_name: qwen3:35b-a3b
    litellm_params:
      model: ollama/qwen3.6:35b-a3b-q4_K_M
      api_base: http://host-gateway:11434

  - model_name: qwen3:35b-fallback
    litellm_params:
      model: ollama/qwen3.6:35b-a3b-q4_K_M
      api_base: http://host-gateway:11434

  # ── Coder (already present) ───────────────────────────────────────────────
  - model_name: qwen2.5-coder:7b
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://host-gateway:11434
