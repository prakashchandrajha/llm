# ═══════════════════════════════════════════════════════════════════════════════
# LiteLLM Proxy Config — Phase 0
# Every call through port 4000 generates a Langfuse trace.
# Ollama runs as host systemd service → http://host-gateway:11434
# Langfuse runs in separate docker project → http://host-gateway:3000
# Hardware: i7-14650HX (no AMX), RTX 5050 sm_120, CUDA 13.2
# ═══════════════════════════════════════════════════════════════════════════════

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  # Langfuse connection injected via env vars:
  #   LANGFUSE_HOST, LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY
  drop_params: true
  request_timeout: 300

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  retry_after: 5

model_list:
  # ── Coordinator (Qwen3-0.5B) ─────────────────────────────────────────────
  - model_name: coordinator
    litellm_params:
      model: ollama/qwen3:0.5b
      api_base: http://host-gateway:11434

  - model_name: qwen3:0.5b
    litellm_params:
      model: ollama/qwen3:0.5b
      api_base: http://host-gateway:11434

  # ── Mem0 LLM + DoCoreAI (Qwen3-4B) ──────────────────────────────────────
  - model_name: qwen3:4b
    litellm_params:
      model: ollama/qwen3:4b
      api_base: http://host-gateway:11434

  # ── Synthesis tier (Qwen3-3B) ────────────────────────────────────────────
  - model_name: synthesis
    litellm_params:
      model: ollama/qwen3:3b
      api_base: http://host-gateway:11434

  - model_name: qwen3:3b
    litellm_params:
      model: ollama/qwen3:3b
      api_base: http://host-gateway:11434

  # ── Master base (Qwen3-7B Q4-K-M) ────────────────────────────────────────
  - model_name: master
    litellm_params:
      model: ollama/qwen3:7b
      api_base: http://host-gateway:11434

  - model_name: qwen3:7b
    litellm_params:
      model: ollama/qwen3:7b
      api_base: http://host-gateway:11434

  # ── Embedding tier ────────────────────────────────────────────────────────
  - model_name: embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host-gateway:11434

  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host-gateway:11434

  # ── 35B fallback (already downloaded: qwen3.6:35b-a3b-q4_K_M) ───────────
  # sm_120 Blackwell — Ollama uses PTX JIT for sm_120. Expect 3-5 s prefill.
  - model_name: qwen3:35b-a3b
    litellm_params:
      model: ollama/qwen3.6:35b-a3b-q4_K_M
      api_base: http://host-gateway:11434

  - model_name: qwen3:35b-fallback
    litellm_params:
      model: ollama/qwen3.6:35b-a3b-q4_K_M
      api_base: http://host-gateway:11434
      fallbacks: ["master"]

  # ── Coder (already present) ───────────────────────────────────────────────
  - model_name: qwen2.5-coder:7b
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://host-gateway:11434
